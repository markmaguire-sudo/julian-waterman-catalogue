# -----------------------------------------------------------------------------
# Julian Waterman — Fine Art Catalogue Netlify Configuration
# Tailored for high-performance Vite single page / static assets delivery
# -----------------------------------------------------------------------------

[build]
  command = "npm run build"
  publish = "dist"

# Single-Page Application (SPA) routing fallback rule
# Ensures direct loads of deep URLs do not result in raw 404 MIME errors
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache-Control and Security Headers for Optimal PWA Performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"

# Specific caching parameters for built, hashed assets (JS & CSS)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Caching for PWA assets & local assets that do not change frequently
[[headers]]
  for = "/icon.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"
